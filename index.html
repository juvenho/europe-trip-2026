<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Europe 2026 — Hovhannes &amp; Anahit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#08080e; --s1:#101016; --s2:#141420; --s3:#1c1c2a;
  --border:rgba(255,255,255,0.06); --border-hi:rgba(255,255,255,0.11);
  --t1:#f2f4f8; --t2:#c0c6d4; --t3:#717a8c; --t4:#3e4255;
  --gold:#c8a347; --gold-bg:rgba(200,163,71,0.09); --gold-b:rgba(200,163,71,0.22);
  --r:12px; --r-sm:7px;
  --now:#e05252;   --now-bg:rgba(224,82,82,0.11);
  --ahead:#d4932a; --ahead-bg:rgba(212,147,42,0.11);
  --there:#2fb87a; --there-bg:rgba(47,184,122,0.09);
  --free-c:#4a5068; --free-bg:rgba(74,80,104,0.22);
  --verify:#d4732a; --verify-bg:rgba(212,115,42,0.13);
  --dest-active:#4a5068;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);font-size:14px;line-height:1.6;overflow:hidden;}
a{color:#60c8e8;text-decoration:none;}
a:hover{text-decoration:underline;}

/* SHELL */
.app{display:flex;flex-direction:column;height:100vh;}

/* TOPBAR */
.topbar{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:13px 26px;border-bottom:1px solid var(--border);background:var(--s1);
  gap:12px;flex-wrap:wrap;
}
.tb-title{font-size:15px;font-weight:700;letter-spacing:-.2px;color:var(--t1);}
.tb-sub{font-size:11px;color:var(--t4);margin-top:2px;}
.tb-pills{display:flex;gap:6px;flex-wrap:wrap;}
.pill{
  font-size:11px;font-weight:600;padding:5px 13px;border-radius:20px;
  border:1px solid var(--border-hi);color:var(--t3);background:none;
  font-family:inherit;cursor:pointer;text-decoration:none;transition:all .15s;white-space:nowrap;
}
.pill:hover{color:var(--t1);border-color:rgba(255,255,255,.25);text-decoration:none;}
.pill.hot{color:var(--gold);border-color:rgba(200,163,71,.35);background:var(--gold-bg);}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{
  width:192px;flex-shrink:0;border-right:1px solid var(--border);
  overflow-y:auto;background:var(--s1);padding:10px 0 24px;
  scrollbar-width:thin;scrollbar-color:var(--border-hi) transparent;
}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:3px;}
.sb-group{
  font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;
  color:var(--t4);padding:16px 17px 5px;display:flex;align-items:center;gap:6px;
}
.sb-group-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.sb-group:first-child{padding-top:10px;}
.sb-day{
  display:flex;align-items:center;gap:10px;padding:8px 17px;
  cursor:pointer;border-left:2px solid transparent;transition:all .15s;
}
.sb-day:hover{background:var(--s2);}
.sb-day.active{background:var(--s2);border-left-color:var(--dest-active);}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sb-date{font-size:12px;font-weight:600;color:var(--t2);line-height:1.2;}
.sb-city{font-size:11px;color:var(--t4);line-height:1.3;margin-top:1px;}
.sb-day.active .sb-date{color:var(--dest-active);}

/* CONTENT */
.content{
  flex:1;overflow-y:auto;padding:0 0 60px;
  scrollbar-width:thin;scrollbar-color:var(--border-hi) transparent;
}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:4px;}
.day-panel{display:none;}
.day-panel.active{display:block;}

/* DEST HERO BAND */
.dest-hero{
  height:3px;width:100%;
  background:linear-gradient(90deg, var(--dest) 0%, transparent 75%);
  margin-bottom:0;
}

/* PANEL BODY */
.panel-body{padding:28px 34px 40px;max-width:900px;}

/* DAY HEADER */
.day-header{margin-bottom:26px;padding-bottom:22px;border-bottom:1px solid var(--border);}
.dh-eyebrow{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
  font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--t4);
}
.dh-dot{width:8px;height:8px;border-radius:50%;}
.dh-dest{color:var(--dest);margin-left:2px;}
.day-header h1{
  font-family:'Playfair Display',serif;font-size:30px;font-weight:700;
  letter-spacing:-.3px;color:var(--t1);margin-bottom:5px;line-height:1.2;
}
.bday-panel h1{color:var(--gold);}
.dh-sub{font-size:13px;color:var(--t3);margin-top:2px;}

/* BIRTHDAY BANNER */
.bday-banner{
  background:linear-gradient(135deg,rgba(200,163,71,.11),rgba(200,163,71,.03));
  border:1px solid var(--gold-b);border-radius:var(--r);
  padding:18px 20px;margin-bottom:20px;
  display:flex;align-items:flex-start;gap:16px;
}
.bday-icon{font-size:30px;flex-shrink:0;line-height:1;}
.bday-ttl{font-size:15px;font-weight:700;color:var(--gold);margin-bottom:4px;font-family:'Playfair Display',serif;}
.bday-sub{font-size:13px;color:var(--t2);line-height:1.55;}

/* SECTION HEADING */
.sec-hd{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--t4);margin:24px 0 11px;}

/* HOTEL CARD */
.hotel-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px;border-top:2px solid var(--dest);}
.hotel-card-lbl{font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--t4);padding:12px 17px 0;}
.hotel-rec{padding:14px 17px 17px;border-bottom:1px solid var(--border);}
.hotel-rec-badge{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-b);border-radius:4px;padding:3px 9px;margin-bottom:10px;}
.hotel-rec-name{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:3px;line-height:1.3;}
.hotel-rec-stars{font-size:12px;color:var(--gold);margin-bottom:9px;}
.hotel-rec-detail{font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:14px;}
.hotel-rec-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.hotel-rec-price{font-size:14px;font-weight:700;color:var(--gold);}
.hotel-alts-hd{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t4);padding:9px 17px;background:rgba(255,255,255,.015);border-bottom:1px solid var(--border);}
.hotel-alt{display:flex;align-items:center;gap:13px;padding:13px 17px;border-top:1px solid var(--border);transition:background .12s;}
.hotel-alt:hover{background:rgba(255,255,255,.018);}
.ha-num{width:22px;height:22px;border-radius:50%;background:var(--s3);border:1px solid var(--border-hi);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t4);}
.ha-info{flex:1;min-width:0;}
.ha-name{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:2px;}
.ha-stars{font-size:11px;color:var(--gold);margin-right:5px;}
.ha-detail{font-size:12px;color:var(--t3);line-height:1.5;}
.ha-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.ha-price{font-size:12px;font-weight:600;color:var(--t3);white-space:nowrap;}

/* SAME-HOTEL STRIP */
.same-hotel{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 15px;margin-bottom:16px;}
.sh-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sh-name{font-size:13px;font-weight:600;color:var(--t2);}
.sh-meta{font-size:11px;color:var(--t4);}

/* TRANSPORT CARD */
.transport-card{background:var(--s2);border:1px solid var(--border);border-left:2px solid var(--dest);border-radius:var(--r);padding:16px 17px;margin-bottom:16px;}
.tc-lbl{font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--t4);margin-bottom:8px;}
.tc-name{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:6px;}
.tc-detail{font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:10px;}
.tc-links{display:flex;gap:8px;flex-wrap:wrap;}

/* LINK BUTTONS */
.lbtn{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.04);border:1px solid var(--border-hi);
  color:var(--t2);border-radius:var(--r-sm);
  font-size:12px;font-weight:600;padding:6px 13px;
  text-decoration:none;font-family:inherit;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.lbtn:hover{background:rgba(255,255,255,.08);color:var(--t1);text-decoration:none;}
.lbtn.g{background:var(--gold-bg);border-color:var(--gold-b);color:var(--gold);}
.lbtn.g:hover{background:rgba(200,163,71,.18);}
.lbtn.d{background:var(--dest-bg);border-color:var(--dest-b);color:var(--dest);}
.lbtn.d:hover{opacity:.8;}
.lbtn.sm{font-size:11px;padding:5px 11px;}

/* SCHEDULE */
.sched{display:flex;flex-direction:column;gap:10px;}
.tb{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:15px 17px;display:flex;gap:15px;transition:border-color .15s;}
.tb:hover{border-color:var(--border-hi);}
.tb-time{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);min-width:80px;padding-top:2px;flex-shrink:0;}
.tb-body{flex:1;min-width:0;}
.tb-what{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:4px;}
.tb-why{font-size:13px;color:var(--t3);line-height:1.6;}
.tb-tip{
  font-size:12px;color:var(--t3);line-height:1.5;margin-top:8px;padding:8px 11px;
  background:rgba(255,255,255,.025);border-radius:6px;border-left:2px solid var(--dest);
}
.tb-tip b{color:var(--t2);font-weight:600;}

/* OPTIONS */
.opt-hd{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t4);margin:12px 0 7px;}
.opt-list{display:flex;flex-direction:column;gap:6px;}
.opt-item{
  display:flex;align-items:center;gap:11px;
  padding:10px 13px;background:var(--s3);
  border:1px solid var(--border);border-radius:var(--r-sm);transition:border-color .12s;
}
.opt-item:hover{border-color:var(--border-hi);}
.opt-item.rec{background:var(--gold-bg);border-color:var(--gold-b);}
.oi-star{font-size:12px;color:var(--gold);width:14px;flex-shrink:0;text-align:center;}
.oi-body{flex:1;min-width:0;}
.oi-name{font-size:13px;font-weight:600;color:var(--t1);line-height:1.3;}
.oi-note{font-size:11px;color:var(--t3);margin-top:2px;line-height:1.4;}
.oi-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.oi-price{font-size:12px;font-weight:700;color:var(--t2);white-space:nowrap;}

/* BOOKING ACTIONS */
.actions{display:flex;flex-direction:column;gap:8px;}
.ac{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:13px;transition:border-color .15s;}
.ac:hover{border-color:var(--border-hi);}
.badge{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;padding:4px 9px;border-radius:4px;white-space:nowrap;flex-shrink:0;min-width:90px;text-align:center;}
.b-now{background:var(--now-bg);color:var(--now);border:1px solid rgba(224,82,82,.25);}
.b-ahed{background:var(--ahead-bg);color:var(--ahead);border:1px solid rgba(212,147,42,.25);}
.b-ther{background:var(--there-bg);color:var(--there);border:1px solid rgba(47,184,122,.2);}
.b-free{background:var(--free-bg);color:var(--free-c);border:1px solid rgba(255,255,255,.08);}
.b-vrfy{background:var(--verify-bg);color:var(--verify);border:1px solid rgba(212,115,42,.3);}
.ac-info{flex:1;min-width:0;}
.ac-name{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:2px;}
.ac-note{font-size:12px;color:var(--t3);line-height:1.45;}
.ac-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.ac-price{font-size:13px;font-weight:700;color:var(--t2);white-space:nowrap;}

/* EXPERT TIP CALLOUT */
.expert-tip{
  background:rgba(255,255,255,.025);border:1px solid var(--border-hi);
  border-left:3px solid var(--dest);border-radius:var(--r);
  padding:13px 16px;margin:14px 0;
}
.expert-tip-lbl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dest);margin-bottom:5px;}
.expert-tip-body{font-size:13px;color:var(--t2);line-height:1.6;}

/* RESPONSIVE */
@media(max-width:780px){
  body{overflow:auto;}
  .app{height:auto;}
  .main{flex-direction:column;overflow:visible;}
  .content{overflow:visible;padding:0 0 40px;}
  .panel-body{padding:18px 16px 30px;}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);overflow-x:auto;overflow-y:hidden;display:flex;flex-direction:row;padding:6px 8px;gap:3px;scrollbar-width:none;}
  .sidebar::-webkit-scrollbar{display:none;}
  .sb-group{display:none;}
  .sb-day{flex-direction:column;align-items:center;gap:2px;padding:7px 10px;border-left:none;border-bottom:2px solid transparent;border-radius:var(--r-sm);white-space:nowrap;flex-shrink:0;}
  .sb-day.active{background:var(--s3);border-bottom-color:var(--dest-active);border-left:none;}
  .sb-dot{display:none;}
  .topbar{padding:10px 14px;}
  .tb-pills{display:none;}
  .day-header h1{font-size:23px;}
  .hotel-alt,.ac,.opt-item{flex-wrap:wrap;}
  .ha-right,.ac-right,.oi-right{padding-top:4px;width:100%;}
  .tb{flex-direction:column;gap:6px;}
  .tb-time{min-width:auto;}
}
@media(max-width:480px){.panel-body{padding:12px 12px 24px;}}
</style>

     {rec:true,name:'S-Bahn S7 — Direct to Wien Hauptbahnhof (25 min)',note:'Cheapest and most direct to your hotel. Departs every 30 min from airport station. Buy a 24-hour Vienna transit pass at the machine — it covers all your city transport today.',price:'€4.40/pp',url:'https://www.wienerlinien.at',label:'Transit Info'},
     {rec:false,name:'City Airport Train (CAT) to Wien Mitte, then U1 to Hauptbahnhof',note:'16 min to Mitte, then 2 stops on U1 to Hauptbahnhof. Faster total but 2 changes.',price:'€14.90/pp + U-Bahn',url:'https://www.cityairporttrain.com',label:'CAT Info'},
     {rec:false,name:'Taxi — Door to Hotel',note:'Fixed rate to city center. No transfers, door-to-door. Best if you have many bags.',price:'~€40–45 flat',url:'https://flughafentaxi-wien.at',label:'Official Taxis'},
   ]},
  {time:'Afternoon',what:'Belvedere Gardens + Karlskirche Walk',
   why:'Sunday — Naschmarkt is closed. The Upper Belvedere gardens are free, beautiful, and 10 minutes from your hotel on foot. Walk through the baroque formal garden toward Karlsplatz. Karlskirche (St. Charles Church) is one of the finest baroque buildings in Europe. The interior has a panoramic elevator you can ride to the ceiling frescoes.',
   tip:'<b>Hidden gem:</b> Inside Karlskirche, €8/pp gets you a glass elevator to the top of the dome. The fresco from above, at eye level, is one of the most unexpected experiences in Vienna.',
   options:[
     {rec:true,name:'Belvedere Gardens (Free) + Karlskirche Interior',note:'Walk from hotel (10 min). Gardens free. Karlskirche elevator €8/pp. Perfect first-afternoon pace.',price:'Free / €8 Karlskirche',url:'https://www.karlskirche.at',label:'Info'},
     {rec:false,name:'Belvedere Gardens Only — Just Walk',note:'The formal baroque garden between Upper and Lower Belvedere. Beautiful even without entering the museum.',price:'Free',url:null,label:null},
   ]},
  {time:'Evening',what:'First Dinner — Schnitzel Night',
   why:'The Wiener Schnitzel is the entry point to Austria. Do it on night one. Order vom Kalb (veal — the authentic version), not pork. House potato salad, a glass of Grüner Veltliner. Skip appetizers. The schnitzel IS the meal.',
   tip:'<b>Two-minute walk from Figlmüller:</b> After dinner, walk Bäckerstrasse into the 1st district. No agenda — just feel the city at night.',
   options:[
     {rec:true,name:'Figlmüller Bäckerstrasse — World-Famous Schnitzel Since 1905',note:'Schnitzel overhangs the plate. The Bäckerstrasse location is slightly less crowded than Wollzeile. Reserve ahead.',price:'€28–42/pp',url:'https://figlmueller.at/en/reservations/',label:'Reserve Table'},
     {rec:false,name:'Gasthaus Pöschl — Classic Viennese Local',note:'More local, quieter, less tourist-facing. Tafelspitz, Sauerkraut, deep Viennese coffeehouse tradition.',price:'€20–34/pp',url:'https://gasthaus-poeschl.at',label:'Site'},
     {rec:false,name:'Steirereck im Stadtpark (Splurge)',note:'One of the top 10 restaurants in the world. Austrian cuisine redefined. If you want one iconic dinner in Vienna, this is it. Book weeks ahead.',price:'€120–180/pp',url:'https://www.steirereck.at',label:'Reserve'},
   ]},
],

{id:'day2',date:'Aug 24',dow:'Monday',city:'Vienna',dest:'vienna',
headline:'Vienna — The Real City',subtitle:'Naschmarkt morning · Belvedere & Klimt afternoon · Spittelberg evening',
hotel:{ci:false,name:'Hotel Schani Wien',location:'Hauptbahnhof · Night 2 of 5'},
transport:null,
schedule:[
  {time:'9:00 AM',what:'Naschmarkt — Vienna\'s Great Market',
   why:'The city\'s central outdoor market, open Monday through Saturday. 120 stalls of cheese, olives, fresh bread, fish, spices, wine. Have breakfast here — a Semmel roll with Liptauer cheese spread and a Turkish coffee from one of the stands. This is the Vienna that Viennese people actually use.',
   tip:'<b>Hidden gem inside the market:</b> Stall 76–78 (Zum Wohl wine bar) opens at 10am and pours excellent Austrian natural wine by the glass. Come back for an afternoon glass after the Belvedere.',
   options:[
     {rec:true,name:'Naschmarkt Walk + Market Breakfast',note:'Free to enter. Budget €10–15 for coffee, pastry, cheese, and a small plate.',price:'~€10–15',url:'https://www.naschmarkt-vienna.com',label:'Info'},
   ]},
  {time:'11:00 AM',what:'Upper Belvedere — Klimt\'s The Kiss',
   why:'The Kiss lives here. Not a print, not a reproduction — the gold leaf in person is a completely different experience from every image you have seen of it. Allow 1.5 hours. The baroque garden between Upper and Lower Belvedere is free and beautiful.',
   tip:'<b>The Klimt room is first floor, Room 5.</b> Go there first before tour groups arrive from their late-morning buses. The painting is smaller than people expect — and more powerful for it.',
   options:[
     {rec:true,name:'Upper Belvedere — Klimt, Schiele, Kokoschka',note:'The essential Vienna museum. Book ticket online — same price, skip the queue.',price:'€23/pp',url:'https://www.belvedere.at/en/go/tickets',label:'Buy Ticket'},
     {rec:false,name:'Upper + Lower Belvedere Combo',note:'Lower houses Baroque museum and Orangery. Adds 1 hour. Worth it if energy holds.',price:'€30/pp',url:'https://www.belvedere.at/en/go/tickets',label:'Combo Ticket'},
   ]},
  {time:'1:30 PM',what:'Lunch — 4th District Local',
   why:'The 4th district (Wieden) around Naschmarkt is where Viennese people actually eat lunch. Completely different from the tourist restaurants of the 1st district.',
   tip:'<b>Zum Wohl</b> (Schleifmühlgasse 12) is a natural wine bar 3 minutes from the Belvedere. Outstanding Austrian wine list, excellent small plates. Nothing like it in the tourist areas.',
   options:[
     {rec:true,name:'Zum Wohl — Natural Wine Bar & Small Plates',note:'Schleifmühlgasse 12, 4th district. Award-winning Austrian wine. Not in any guidebook. Go.',price:'€20–35/pp',url:'https://www.zumwohl.at',label:'Site'},
     {rec:false,name:'Café Hawelka — Historic Coffeehouse',note:'Dorotheergasse 6, 1st district. Open since 1939. Small, dark, atmospheric. The artists and intellectuals went here for decades. Order Melange coffee.',price:'€8–15',url:'https://www.hawelka.at',label:'Site'},
   ]},
  {time:'3:00 PM',what:'Secession Building — The Hidden Klimt',
   why:'100 meters from Naschmarkt. Almost no tourists go here. The Secession is where Klimt and his circle broke from the Vienna art establishment in 1897. The building is extraordinary (the golden "cabbage head" dome). In the basement: Beethoven Frieze, Klimt\'s 34-meter-long mural. If you see The Kiss at Belvedere, see this too. They are a pair.',
   tip:'<b>Insider note:</b> On the ground floor, the Secession hosts rotating contemporary art exhibitions. Usually excellent. Budget 45 minutes total.',
   options:[
     {rec:true,name:'Secession Building + Beethoven Frieze',note:'Friedrichstrasse 12. Right next to Naschmarkt. Almost never crowded.',price:'€12/pp',url:'https://www.secession.at',label:'Buy Ticket'},
   ]},
  {time:'Evening',what:'Spittelberg — Dinner in Vienna\'s Best Quarter',
   why:'The 7th district (Spittelberg) is a cobblestone neighborhood of 18th-century townhouses, outdoor terrace restaurants, and wine bars. Where local Vienna eats in summer. The tourist gradient drops completely once you cross the Ring.',
   tip:'<b>Walk Spittelberggasse first</b> — it is essentially one street of good restaurants. Arrive by 7pm for outdoor terrace seating without waiting.',
   options:[
     {rec:true,name:'Amerlingbeisl — Courtyard Garden',note:'Best courtyard terrace in the 7th. Traditional Viennese food in a beautiful walled garden.',price:'€25–38/pp',url:'https://www.amerlingbeisl.at',label:'Site'},
     {rec:false,name:'Zu den zwei Liesln — Old Vienna',note:'The most authentically un-touristy Gasthaus in the neighborhood. Cash preferred.',price:'€18–28/pp',url:'https://www.zudenzweiliesln.at',label:'Site'},
     {rec:false,name:'Das Loft at Hotel Sofitel (Drinks only)',note:'35th floor rooftop bar with 360-degree Vienna panorama. Go for cocktails before or after dinner.',price:'€14–22/drink',url:'https://www.sofitel-vienna-stephansdom.com/das-loft',label:'Site'},
   ]},
],

  {badge:'ther',name:'Secession Building + Beethoven Frieze',note:'Buy at the door on the day.',price:'€12/pp',url:'https://www.secession.at',label:'Info'},

{id:'day3',date:'Aug 25',dow:'Tuesday',city:'Prague',dest:'prague',
headline:'Vienna → Prague',subtitle:'Morning train · Afternoon in Old Town · Evening on Charles Bridge',
hotel:{
  ci:true,stay:'1 night · Aug 25',
  name:'Hotel Maximilian Praha',stars:'★★★★★',
  detail:'Boutique hotel on a quiet cobblestone street in Old Town, 4 minutes walk from Old Town Square. 71 rooms. Beautiful interior design, excellent service, genuinely calm despite being in the heart of the old city. One of Prague\'s best small hotels. Breakfast included. Your Vienna hotel stays booked for this night — leave bags in Vienna, travel light with 1 overnight bag.',
  price:'€200–320/night',
  url:'https://www.booking.com/hotel/cz/maximilian-prague.html?checkin=2026-08-25&checkout=2026-08-26&group_adults=2&no_rooms=1',
  alts:[
    {name:'Hotel Josef',stars:'★★★★',detail:'Modern design by Czech-British architect Eva Jiřičná. Old Town location, clean contemporary rooms, great service. More affordable than the Maximilian.',price:'€150–240/night',url:'https://www.booking.com/hotel/cz/josef.html?checkin=2026-08-25&checkout=2026-08-26&group_adults=2&no_rooms=1'},
    {name:'The Emblem Hotel',stars:'★★★★★',detail:'Boutique luxury in Old Town. 59 rooms. Rooftop bar with city views. More contemporary design.',price:'€250–400/night',url:'https://www.booking.com/hotel/cz/the-emblem-prague.html?checkin=2026-08-25&checkout=2026-08-26&group_adults=2&no_rooms=1'},
    {name:'Miss Sophie\'s New Town',stars:'★★★',detail:'Design hotel in Nové Město (New Town), 15-min walk to Old Town. Outstanding value, stylish rooms, excellent breakfast. Best budget-conscious choice.',price:'€90–140/night',url:'https://www.booking.com/hotel/cz/miss-sophies.html?checkin=2026-08-25&checkout=2026-08-26&group_adults=2&no_rooms=1'},
  ]
},
transport:{label:'MORNING TRAIN — BOOK IN ADVANCE',name:'Wien Hauptbahnhof → Praha Hlavní Nádraží — ~4 hours',
detail:'OBB EuroCity or Railjet trains. Depart ~7:49am (EC 103) or 9:49am — arrive Prague by noon or 2pm. Book on OBB.at now. August trains between Vienna and Prague fill weeks ahead. Travel light — your main luggage stays at your Vienna hotel.',
links:[{label:'Book on OBB',url:'https://shop.oebbtickets.at/en/ticket'},{label:'Czech Rail CD',url:'https://www.cd.cz/en/'}]},
schedule:[
  {time:'Morning',what:'Train from Wien Hauptbahnhof to Prague',
   why:'4 hours through Lower Austria and Bohemia. The train enters the Czech Republic at Břeclav — landscape shifts immediately. Bring coffee and watch it change.',
   tip:'<b>Travel light for Prague.</b> Leave your main luggage at your Vienna hotel\'s storage and take a small bag with overnight essentials. No checked bags, no hotel check-out, no morning stress.'},
  {time:'Noon',what:'Arrive Prague — Drop Bags, Walk to Old Town',
   why:'Praha Hlavní Nádraží is 20 minutes on foot or 5 minutes by metro to Old Town. After the hotel bag drop, the whole afternoon is open.',
   tip:'<b>Do not take a taxi from the station.</b> Prague taxis from Hlavní Nádraží to Old Town are notorious for overcharging tourists. Metro line C to Muzeum, then line A to Staroměstská is €1.50 and 8 minutes.',
   options:[
     {rec:true,name:'Metro to Old Town (Line C → A, Staroměstská stop)',note:'Cheapest, fastest, safest. Buy a 24-hour pass at the station for all-day use.',price:'~€1.50',url:null,label:null},
     {rec:false,name:'Bolt or Uber — App-Based Rideshare',note:'If you prefer car. Use Bolt or Uber, NOT a street taxi. Fixed price shown in advance.',price:'~€5–8',url:null,label:null},
   ]},
  {time:'Afternoon',what:'Old Town Square + Astronomical Clock',
   why:'Staroměstské náměstí is one of the great medieval squares in Europe. The Astronomical Clock (Orloj, 1410) performs on the hour — figures emerge, bells ring. Touristy but genuinely beautiful. The Gothic Týn Church towers over the square. Walk through Josefov (the Jewish Quarter) — Maisel Synagogue, Old Jewish Cemetery.',
   tip:'<b>Go inside Týn Church</b> (the black-spired cathedral on the square). Most tourists photograph it and never enter. The interior is a Gothic shock — gloomy, medieval, completely authentic.'},
  {time:'4:30 PM',what:'Cross Charles Bridge to Malá Strana',
   why:'Charles Bridge connects Old Town to Malá Strana (Lesser Town). 30 baroque statues line the parapets. In afternoon light the river view is extraordinary. Cross, then climb the hill toward Prague Castle — or just explore Malá Strana\'s cobblestone alleys.',
   tip:'<b>The bridge at night (after dinner)</b> is the real experience. Almost no one, lantern light, the castle lit above. Walk back across after dinner.'},
  {time:'Evening',what:'Dinner — Lokál Dlouhá (Non-Negotiable)',
   why:'The best Czech food in Prague — and completely non-tourist. Lokál is a modern Czech restaurant doing classic dishes with exceptional ingredients and technique. Svíčková (beef sirloin in cream sauce with bread dumplings), roast pork, house-brewed Pilsner Urquell unfiltered. This is what Czech food actually tastes like.',
   tip:'<b>Book ahead.</b> Lokál Dlouhá fills every night. Reserve online 1–2 weeks before. If it\'s full, the branch Lokál Hamburk or Lokál U Bílé kuželky are the same quality.',
   options:[
     {rec:true,name:'Lokál Dlouhá — Czech Brasserie, Old Town',note:'Dlouhá 33, Prague 1. Best Czech cooking in the city. Reserve ahead.',price:'€20–35/pp',url:'https://lokal-dlouha.ambi.cz/en/reservation/',label:'Reserve'},
     {rec:false,name:'Café Savoy — Art Nouveau Interior, Malá Strana',note:'Vítězná 5, Malá Strana. Stunning neo-baroque interior. Czech and international cuisine. Beautiful for a special dinner.',price:'€30–50/pp',url:'https://cafesavoy.ambi.cz/en/',label:'Reserve'},
     {rec:false,name:'Eska — Modern Czech (Michelin Bib Gourmand)',note:'Křižíkova 34, Karlín district. 15-min walk from Old Town. Creative Czech tasting menu, fermented and preserved ingredients. The best contemporary Czech cooking in the city.',price:'€40–65/pp',url:'https://www.eska.ambi.cz',label:'Site'},
   ]},
  {time:'Late Evening',what:'Charles Bridge at Night',
   why:'Walk back across Charles Bridge. 10pm — the tourist crowds are gone, lanterns are lit, the Vltava reflects the castle. This is the Prague that stays with you.',
   tip:'Stand at the midpoint of the bridge and look upstream: Hradčany castle illuminated above the river at night. One of the great views in Europe.'},
],

// ═══ DAY 4 ═══
{id:'day4',date:'Aug 26',dow:'Wednesday',city:'Prague → Vienna',dest:'prague',
headline:'Prague Morning → Back to Vienna',subtitle:'Prague Castle at dawn · Afternoon train · Easy Vienna evening',
hotel:{ci:false,name:'Hotel Schani Wien',location:'Back to Vienna · Night 3 of 5'},
transport:{label:'AFTERNOON TRAIN BACK',name:'Praha Hlavní Nádraží → Wien Hauptbahnhof — ~4 hours',
detail:'Take an afternoon train to maximize your Prague morning. Recommend 13:49 or 15:49 departure — arrives Vienna 5:49pm or 7:49pm. Book in advance with your outbound ticket.',
links:[{label:'Book on OBB',url:'https://shop.oebbtickets.at/en/ticket'}]},
schedule:[
  {time:'7:00 AM',what:'Prague Castle + Hradčany at Dawn',
   why:'Prague Castle is the largest ancient castle complex in the world. At 7am — before the tour buses arrive at 9am — you have it almost to yourself. The St. Vitus Cathedral interior is a Gothic masterpiece. The Golden Lane (Zlatá ulička) is a row of tiny medieval houses where Franz Kafka lived at No. 22 in 1916–17.',
   tip:'<b>Walk up Nerudova Street</b> from Malá Strana to the castle — the steep cobblestone approach through baroque townhouses is part of the experience. Takes 15 minutes. Far better than the tourist shuttle.',
   options:[
     {rec:true,name:'Prague Castle — Long Route (St. Vitus + Old Royal Palace + Golden Lane)',note:'Buy the Long Route ticket. Includes everything worth seeing. ~2.5 hours.',price:'€20/pp',url:'https://www.hrad.cz/en/prague-castle-for-visitors/castle-tickets',label:'Buy Ticket'},
     {rec:false,name:'Just St. Vitus Cathedral (Free Interior)',note:'The cathedral interior is free without a ticket. Just walk in before 9am.',price:'Free',url:null,label:null},
   ]},
  {time:'10:00 AM',what:'Letná Park — Local Panorama',
   why:'After the castle, walk down the Stag Moat or take the tram to Letná Park (Letenské sady) — a massive hilltop park above the Vltava. There is a beer garden (Letenský zámeček) with an open-air terrace and the best free panorama of Prague. Not in most guidebooks.',
   tip:'<b>The giant metronome at Letná</b> sits on the plinth where Stalin\'s 15-meter statue once stood (demolished 1962). The panorama from there: the entire city from above, both banks of the Vltava, the bridges. Go.'},
  {time:'Noon',what:'Final Prague Lunch Before Train',
   why:'One last meal before the 1:49pm or later train back.',
   options:[
     {rec:true,name:'Café Louvre — Historic Brasserie',note:'Národní 22. Open since 1902. Einstein and Kafka both sat here. Excellent lunch menu. Beautiful interior.',price:'€15–25/pp',url:'https://www.cafelouvre.cz',label:'Site'},
     {rec:false,name:'Nase Maso — Butcher Counter Lunch',note:'Dlouhá 39 (near Lokál). Local butcher that cooks. Pull up a stool, point at what you want. Incredible quality, very cheap.',price:'€8–15/pp',url:null,label:null},
   ]},
  {time:'Afternoon',what:'Train back to Vienna',
   why:'4 hours back to Vienna. The border crossing at Břeclav. Back at Hauptbahnhof by evening. Your room is waiting — no check-in needed.',
   tip:'<b>Pick up a Czech pastry (Trdelník from a good bakery — not the tourist cones, try Saint Tropez in Nové Město) for the train.</b>'},
  {time:'Evening',what:'Vienna Recovery Evening',
   why:'Rest. Two cities in two days is energetic. Either a quiet dinner near the hotel, or a walk along the Ringstrasse to see the Staatsoper and Kunsthistorisches Museum illuminated at night.',
   tip:'<b>Café Central</b> (Herrengasse 14) for a late Melange coffee and a slice of Apfelstrudel. The vaulted neo-Gothic interior is extraordinary. Worth seeing once.'},
],
actions:[
  {badge:'ther',name:'Prague Castle — Long Route Ticket',note:'Buy at castle gate or online morning of.',price:'€20/pp',url:'https://www.hrad.cz/en/prague-castle-for-visitors/castle-tickets',label:'Buy Ticket'},
]},

{id:'day5',date:'Aug 27',dow:'Thursday',city:'Vienna',dest:'vienna',
headline:'Vienna — The Palaces',subtitle:'Schönbrunn morning · Hofburg afternoon · Heuriger evening',
hotel:{ci:false,name:'Hotel Schani Wien',location:'Hauptbahnhof · Night 4 of 5'},
transport:null,
schedule:[
  {time:'9:00 AM',what:'Schönbrunn Palace',
   why:'Habsburg imperial summer residence. 1,441 rooms. UNESCO World Heritage. Tour groups from coach buses arrive after 10:30am — the 9am window is nearly private. Buy online in advance and go straight through with mobile ticket.',
   tip:'<b>After the state rooms:</b> Walk up through the formal gardens to the Gloriette at the top. The panorama of Vienna from the Gloriette terrace — palace in the foreground, city behind — is the definitive Vienna view. Free to walk up.',
   options:[
     {rec:true,name:'Grand Tour — 40 State Rooms',note:'The complete experience. ~2.5 hours including gardens. Empress Maria Theresa\'s apartments, Napoleon\'s bedroom.',price:'€38/pp',url:'https://www.imperialtickets.com/en/product/schonbrunn-palace-grand-tour',label:'Buy Ticket'},
     {rec:false,name:'Imperial Tour — 26 State Rooms',note:'Shorter version. ~1.5 hours. Good if energy is limited after Prague.',price:'€30/pp',url:'https://www.imperialtickets.com/en/product/schonbrunn-palace-imperial-tour',label:'Buy Ticket'},
   ]},
  {time:'1:00 PM',what:'Lunch — Near Schönbrunn',
   why:'The area around Schönbrunn is the 13th district (Hietzing). Very local, no tourists.',
   tip:'<b>Café Residenz inside Schönbrunn</b> does a proper Austrian lunch — Tafelspitz, Palatschinken. Or walk 5 minutes to Aida (the pink Vienna café chain) for a quick break.',
   options:[
     {rec:true,name:'Café Residenz — Austrian Lunch Inside the Palace Complex',note:'Traditional Austrian menu in a beautiful historic room. Included in some palace packages.',price:'€20–35/pp',url:'https://www.schoenbrunn.at/en/things-to-know/restaurants',label:'Info'},
   ]},
  {time:'Afternoon',what:'Hofburg Palace — Imperial Apartments',
   why:'The winter residence of the Habsburg emperors. The Imperial Apartments cover Empress Sisi\'s private rooms — her obsessive fitness regime, her diet, her beauty routine. The Sisi Museum has the most revealing portrait of her actual personality. The Imperial Silver Collection downstairs has 7,000 pieces of Habsburg table silver.',
   tip:'<b>The Sisi Museum is genuinely moving,</b> not just a royal vanity display. She was a deeply unhappy woman who found freedom only in obsessive travel and exercise. The parallels to modern burnout are striking.',
   options:[
     {rec:true,name:'Hofburg — Imperial Apartments + Sisi Museum + Silver Collection',note:'Combo ticket covers all three. ~2 hours. Book online.',price:'€19.50/pp',url:'https://www.hofburg-wien.at/en/things-to-know/tickets.html',label:'Buy Ticket'},
   ]},
  {time:'Evening',what:'Mayer am Pfarrplatz — Heuriger Wine Tavern',
   why:'A Heuriger is an Austrian wine tavern that serves only wine from its own vineyard. Mayer am Pfarrplatz is in Heiligenstadt (19th district, 20 min from center by U4 metro) — Beethoven lived here in 1817, hoping the country air would cure his deafness. The wine is extraordinary. The food is cold buffet: cheese, meats, bread. You choose what you want. Locals come with families.',
   tip:'<b>The Heuriger experience</b> is the part of Vienna that most visitors never find. This is genuinely how Viennese people spend summer evenings. The wine is from their vineyard 200 meters away.',
   options:[
     {rec:true,name:'Mayer am Pfarrplatz — Beethoven\'s Heuriger',note:'Pfarrplatz 2, Heiligenstadt. U4 to Heiligenstadt (25 min from center). Open evenings Wed–Sun. Book ahead in summer.',price:'€25–40/pp food+wine',url:'https://www.mayer.at',label:'Reserve'},
     {rec:false,name:'Heuriger Sirbu — Vineyard Views',note:'Stammerdorfer Kellergasse, 21st district. On the actual Vienna vineyard hillside. More remote but extraordinary setting. Car recommended.',price:'€20–35/pp',url:'https://www.sirbu.at',label:'Site'},
     {rec:false,name:'Stay in the City — Das Loft Rooftop Bar',note:'Hotel Sofitel, 35th floor. 360-degree Vienna skyline cocktails.',price:'€14–22/drink',url:'https://das-loft.at',label:'Site'},
   ]},
],
actions:[
  {badge:'ahed',name:'Schönbrunn Grand Tour',note:'Book 2–4 weeks ahead for August. Skip the queue.',price:'€38/pp',url:'https://www.imperialtickets.com/en/product/schonbrunn-palace-grand-tour',label:'Buy Ticket'},
  {badge:'ahed',name:'Hofburg Imperial Apartments',note:'Book online — same price as door.',price:'€19.50/pp',url:'https://www.hofburg-wien.at/en/things-to-know/tickets.html',label:'Buy Ticket'},
  {badge:'ahed',name:'Mayer am Pfarrplatz — Evening Reservation',note:'Reserve 1 week before.',price:'€25–40/pp',url:'https://www.mayer.at',label:'Reserve'},
]},

{id:'day6',date:'Aug 28',dow:'Friday',city:'Budapest',dest:'budapest',
headline:'Vienna → Budapest',subtitle:'Morning train · Thermal baths · Danube at night',
hotel:{
  ci:true,stay:'1 night · Aug 28',
  name:'Párisi Udvar Hotel Budapest',stars:'★★★★★',
  detail:'Inside a 19th-century covered arcade — one of Budapest\'s most extraordinary buildings. Hyatt Unbound Collection. 110 rooms. The arcade itself (Parisian Court) has been restored to its original splendor: a vaulted iron-and-glass ceiling, mosaic floors, ornate ironwork balconies. Even if you stay somewhere else, walk through this building. Price is a splurge — the alternatives below are equally well-located at a fraction of the cost.',
  price:'€300–520/night',
  url:'https://www.booking.com/hotel/hu/parisi-udvar.html?checkin=2026-08-28&checkout=2026-08-29&group_adults=2&no_rooms=1',
  alts:[
    {name:'Continental Hotel Zara Budapest',stars:'★★★★',detail:'1906 building in the Jewish Quarter, next to the Great Synagogue. Outstanding value. Beautiful lobby, genuine heritage atmosphere, central location.',price:'€100–180/night',url:'https://www.booking.com/hotel/hu/continental-zara-budapest.html?checkin=2026-08-28&checkout=2026-08-29&group_adults=2&no_rooms=1'},
    {name:'Hotel Victoria Budapest',stars:'★★★★',detail:'Buda side, direct Danube view from every room. Looking across the river toward Parliament. Quieter side of the city — 10 min walk across Chain Bridge to Pest.',price:'€130–220/night',url:'https://www.booking.com/hotel/hu/victoria-budapest.html?checkin=2026-08-28&checkout=2026-08-29&group_adults=2&no_rooms=1'},
    {name:'NH Collection Budapest City Center',stars:'★★★★',detail:'Modern, reliable, central Pest. Good service, clean contemporary rooms. The no-surprises option.',price:'€120–200/night',url:'https://www.booking.com/hotel/hu/nh-collection-budapest-city-center.html?checkin=2026-08-28&checkout=2026-08-29&group_adults=2&no_rooms=1'},
  ]
},
transport:{label:'MORNING TRAIN',name:'Wien Hauptbahnhof → Budapest-Keleti — ~2h30',
detail:'EuroCity trains run every 2 hours from Hauptbahnhof. Recommended: depart 8–9am to maximize Budapest time. Book on OBB. Arrive Keleti by midday.',
links:[{label:'Book OBB',url:'https://shop.oebbtickets.at/en/ticket'}]},
schedule:[
  {time:'Morning',what:'Train — Vienna to Budapest',
   why:'2.5 hours through the Pannonian Plain. The train crosses the Hungarian border at Hegyeshalom. Budapest\'s Keleti Station is a grand 19th-century terminal worth 5 minutes of standing and looking up.',
   tip:'<b>Keleti is not where most tourists go wrong — the taxis outside are.</b> Use the metro (M2 line, 3 stops to Deák tér) or Bolt/Uber from the app. Never get in an unmarked taxi.'},
  {time:'Afternoon',what:'Széchenyi Thermal Baths',
   why:'Budapest sits on 120 thermal springs. The Széchenyi baths (built 1913) are the most beautiful — a neo-baroque palace in City Park with three outdoor pools and 15 indoor pools. Water temperature: 36–38°C. This is where Budapest locals come to sit in hot water, play chess, and read the newspaper. Allow 2.5 hours.',
   tip:'<b>Book a timed entry online</b> — August can have queues. Bring flip-flops and a towel (or rent there for €2). The outdoor pool at 3pm in August: warm water, afternoon sun, one of the best hours of this whole trip.',
   options:[
     {rec:true,name:'Széchenyi Baths — Timed Entry',note:'Book online at least 1 day ahead in August. Includes all pools.',price:'€25–30/pp',url:'https://www.szechenyibath.com',label:'Book Entry'},
     {rec:false,name:'Gellért Baths — Art Nouveau Alternative',note:'On the Buda side. Art Nouveau interior (1918), more intimate than Széchenyi. Slightly more expensive.',price:'€30–38/pp',url:'https://www.gellertbath.com',label:'Book Entry'},
   ]},
  {time:'Evening',what:'Danube Promenade → Chain Bridge → Fisherman\'s Bastion',
   why:'Walk the Pest promenade from the Elizabeth Bridge toward Parliament — the parliament building lit at night is extraordinary. Cross the Chain Bridge to Buda. Take the funicular or walk up to Fisherman\'s Bastion: fairy-tale neo-Gothic towers on the Buda hill, free entry, panorama of the Pest bank at night.',
   tip:'<b>Fisherman\'s Bastion at night</b> is one of the most photographed spots in Europe for good reason. Get there by 9pm — the city lights across the Danube, Parliament\'s reflection in the water. Unhurried. Worth every minute.'},
  {time:'Dinner',what:'Stand Budapest or Borkonyha Wine Kitchen',
   why:'1 night means 1 meal. Make it count. Stand Budapest (Michelin-starred) is the best Hungarian cooking in the city — modern interpretation of traditional cuisine, outstanding wine list. Borkonyha Wine Kitchen (also Michelin) is slightly more casual with an extraordinary wine cellar.',
   tip:'<b>After dinner:</b> One drink at Szimpla Kert (Kazinczy u. 14) — the original Budapest ruin bar. An abandoned factory turned bar with mismatched furniture, local art, and a garden. See it for 45 minutes. It is a genuine cultural artifact.',
   options:[
     {rec:true,name:'Stand Budapest — Michelin Starred Hungarian Cuisine',note:'Székely Mihály u. 2. Book at least 3–4 weeks ahead. Modern Hungarian tasting menu.',price:'€60–90/pp',url:'https://www.standrestaurant.hu',label:'Reserve'},
     {rec:false,name:'Borkonyha Wine Kitchen — Michelin, Casual',note:'Hold u. 3 (near Basilica). Outstanding wine list. More relaxed format. Book ahead.',price:'€50–80/pp',url:'https://www.borkonyha.hu/en',label:'Reserve'},
     {rec:false,name:'Café Gerbeaud (Dessert Only)',note:'Vörösmarty tér 7. Historic 1858 coffee house. Best for dessert and a coffee after a lighter dinner.',price:'€8–18/pp',url:'https://www.gerbeaud.hu',label:'Site'},
   ]},
],

{id:'day7',date:'Aug 29',dow:'Saturday',city:'Budapest → Salzburg',dest:'salzburg',
headline:'Budapest → Salzburg',subtitle:'Long travel day · Arrive late afternoon · First evening in the old city',

  ci:true,stay:'3 nights · Aug 29–Sep 1',
  name:'H+ Hotel Salzburg',stars:'★★★★',
  detail:'Modern 4-star hotel well-located for the Altstadt. Walking distance to Mirabell Gardens and the old city center. Clean, reliable service. A solid operational base for the Salzburg days and the Munich day trip. Not the most atmospheric hotel in the city, but extremely practical for this itinerary.',
  price:'€120–200/night',
  url:'https://www.booking.com/hotel/at/hplus-salzburg.html?checkin=2026-08-29&checkout=2026-09-01&group_adults=2&no_rooms=1',
  alts:[
    {name:'Hotel Stein',stars:'★★★★',detail:'On the Salzach riverbank, Altstadt side. Rooftop terrace with the single best panoramic view of the fortress and the old city. 56 rooms. Genuinely beautiful hotel.',price:'€180–280/night',url:'https://www.booking.com/hotel/at/stein.html?checkin=2026-08-29&checkout=2026-09-01&group_adults=2&no_rooms=1'},
    {name:'Hotel Goldene Ente',stars:'★★★★',detail:'Inside a 14th-century town house in the Altstadt. 70 rooms. Steps from Getreidegasse. The most atmospheric and central option — you wake up inside the old city.',price:'€150–240/night',url:'https://www.booking.com/hotel/at/goldene-ente.html?checkin=2026-08-29&checkout=2026-09-01&group_adults=2&no_rooms=1'},
  ]
},
transport:{label:'TRAVEL DAY — TRAIN VIA VIENNA',name:'Budapest-Keleti → Wien Hauptbahnhof → Salzburg Hauptbahnhof — ~5.5–6 hours',
detail:'Take an early Budapest departure (~7–8am) to arrive Salzburg by early afternoon. Route: Budapest–Wien (~2h30) with 45-min connection, then Wien–Salzburg (~2h30). Total with connection: ~5.5–6 hours. All on OBB. Book now — Saturday August trains fill. Alternatively, some days have a direct EuroCity Budapest–Salzburg via Linz — check OBB for availability.',
links:[{label:'Book OBB',url:'https://shop.oebbtickets.at/en/ticket'}]},
schedule:[
  {time:'7:00 AM',what:'Gellért Hill Sunrise (Optional)',
   why:'If you wake early, walk to Gellért Hill before leaving Budapest. 30-minute climb to the Citadella at the top. The city from above at 7am: the bridges, Parliament, both banks of the Danube catching early light. Worth every step if energy allows.',
   tip:'<b>Leave by 8am at the latest</b> to make the morning train connections.'},
  {time:'Morning',what:'Train — Budapest to Salzburg (via Vienna)',
   why:'A long but comfortable train journey through three countries. Pack snacks, bring reading. The OBB Railjet is an excellent train — panoramic windows, dining car, quiet.',
   tip:'<b>Change at Wien Hauptbahnhof</b> — connection is usually 40–60 minutes, enough time to grab a sandwich at the station market.'},
  {time:'Afternoon',what:'Arrive Salzburg — Check In, First Walk',
   why:'Drop bags at H+ Hotel, then walk 15 minutes to the Altstadt. Your first sight of the fortress on the hill above the old city announces the change from Central Europe to Alpine Austria.',
   tip:'<b>Cross the Staatsbrücke bridge</b> and look upstream: the fortress on the left cliff, the old city in the valley, the Alps behind. This view is the arrival moment.'},
  {time:'Evening',what:'Dinner — Zum Zirkelwirt (Local, Non-Touristy)',
   why:'Pfeifergasse 14, inside the Altstadt. A neighborhood Gasthaus that locals use every week. No tour groups, no Sound of Music menu. Excellent Tafelspitz, crispy Schweinsbraten (pork roast), local wine. After a long travel day, this is the exactly right dinner.',
   tip:'<b>5-minute walk from Getreidegasse</b> but in a completely different world. Ask for the daily specials, which are never on the English menu.',
   options:[
     {rec:true,name:'Zum Zirkelwirt — Local Salzburg Gasthaus',note:'Pfeifergasse 14. No reservations needed on weekdays. Arrive by 7pm.',price:'€20–32/pp',url:null,label:null},
     {rec:false,name:'Café Bazar — Riverside Brasserie',note:'Schwarzstrasse 3, on the Salzach. Open since 1902. The intellectual café of Salzburg. Excellent food, beautiful room, local crowd.',price:'€22–36/pp',url:'https://www.cafe-bazar.at',label:'Site'},
   ]},
],
actions:[
  {badge:'now',name:'Train — Budapest → Salzburg (Aug 29)',note:'Book now. Saturday trains fill. Book via OBB — include Wien connection.',price:'~€40–80/pp',url:'https://shop.oebbtickets.at/en/ticket',label:'Book OBB'},
  {badge:'now',name:'Salzburg Hotel — 3 nights (Aug 29–Sep 1)',note:'Book now.',price:'from €120/night',url:'https://www.booking.com/hotel/at/hplus-salzburg.html?checkin=2026-08-29&checkout=2026-09-01&group_adults=2&no_rooms=1',label:'Book Hotel'},
]},

{id:'day8',date:'Aug 30',dow:'Sunday',city:'Salzburg',dest:'salzburg',
headline:'Salzburg — Full Day',subtitle:'Fortress · Hidden streets · Mozart country · Monastery beer garden',
hotel:{ci:false,name:'H+ Hotel Salzburg',location:'Night 2 of 3'},
transport:null,
schedule:[
  {time:'9:00 AM',what:'Hohensalzburg Fortress',
   why:'The 1,000-year-old fortress above the city. The funicular takes 1 minute up from the Festungsgasse. Walk the ramparts, see the city and the Alps. The state rooms inside (Princes\' Chambers) are beautifully preserved medieval interiors. The panorama from the main terrace — old city below, Untersberg and the Berchtesgaden Alps behind — is the defining Salzburg view.',
   tip:'<b>Arrive before 9:30am</b> on Sundays. Tour buses fill the cobblestone approach by 10am. After the fortress, descend by foot through the old cemetery (Petersfriedhof) — the rock-cut family tombs in the cliff face are extraordinary.',
   options:[
     {rec:true,name:'Fortress Funicular + Full Entry',note:'Includes all state rooms and ramparts. Book online.',price:'€16/pp',url:'https://www.salzburg-burgen.at/en/hohensalzburg-fortress/',label:'Buy Ticket'},
   ]},
  {time:'11:00 AM',what:'Getreidegasse + Mozart\'s Birthplace',
   why:'The famous narrow shopping street with wrought-iron guild signs. Touristy but genuinely beautiful architecture. Mozart was born at No. 9 in 1756 — his first violin is inside. Allow 45 minutes for the birthplace visit.',
   tip:'<b>The real Salzburg street is Steingasse</b> — directly across the Salzach, parallel to Getreidegasse, completely tourist-free. Medieval lane, almost unchanged since the 17th century. Walk Steingasse after Getreidegasse and feel the difference.',
   options:[
     {rec:true,name:'Mozart\'s Birthplace (Geburtshaus)',note:'Getreidegasse 9. Small museum. First violin, childhood portraits, family correspondence.',price:'€11/pp',url:'https://www.mozarteum.at/mozarts-geburtshaus/',label:'Buy Ticket'},
   ]},
  {time:'1:00 PM',what:'Lunch — Café Bazar',
   why:'Schwarzstrasse 3 on the Salzach riverbank. Open since 1902. This is the café of Salzburg intellectuals, musicians, and locals who have been coming for generations. Excellent Austrian lunch menu, beautiful interior, terrace on the river.',
   tip:'<b>Order the Tafelspitz</b> (boiled beef, the classic Austrian preparation) or the Kalbsrahmgulasch (veal goulash). The Salzach terrace table in August afternoon is perfect.'},
  {time:'3:00 PM',what:'Schloss Hellbrunn — The Trick Fountains',
   why:'15 minutes south of the city by bus (No. 25 from Hauptbahnhof). The Archbishop\'s summer palace (1619). The outdoor water gardens have trick fountains — jets embedded in stone tables, hidden sprays in walkways. The Archbishop used them to drench his guests without warning. They still work, and visitors still get soaked. Unexpected and genuinely delightful.',
   tip:'<b>Wear clothes you don\'t mind getting wet.</b> The trick is that you never know when the water comes. Bring the mood of someone who can laugh at themselves.',
   options:[
     {rec:true,name:'Hellbrunn Palace + Trick Fountains',note:'Bus No. 25 from Hauptbahnhof. Tour runs on the hour.',price:'€15/pp',url:'https://www.hellbrunn.at/en/',label:'Buy Ticket'},
   ]},
  {time:'Evening',what:'Augustiner Bräustübl — The Monastery Beer Garden',
   why:'Lindhofstrasse 7. A 400-year-old Augustinian monastery has been brewing beer here since 1621. 1,000-person beer garden under chestnut trees. Wooden kegs tapped by hand. You bring your own food from the market stalls inside (cold meats, bread, pretzels, cheese). This is the most local thing you can do in Salzburg — no tour group has ever been interested in it.',
   tip:'<b>The system:</b> Enter, pick up a heavy ceramic mug from the rinse station, go to the keg counter, pay for your beer poured directly from the keg into your mug, then buy food from the stalls on the right. Find a table. This is how it has worked for 400 years.',
   options:[
     {rec:true,name:'Augustiner Bräustübl — Monastery Beer Garden',note:'Open Mon–Fri 3pm, Sat–Sun 2:30pm. Bring cash. No reservations.',price:'€5–12 for food and beer',url:'https://augustinerbier.at',label:'Site'},
     {rec:false,name:'M32 at Museum of Modern Art (Dinner Alternative)',note:'Mönchsberg 32 — take the Mönchsberg lift (€3.70). Rooftop restaurant, spectacular city view, modern Austrian cuisine. Better for a special dinner than the beer garden.',price:'€50–70/pp',url:'https://www.m32.at',label:'Reserve'},
   ]},
],
actions:[
  {badge:'ahed',name:'Hohensalzburg Fortress — Funicular + Entry',note:'Book online 1–2 days before.',price:'€16/pp',url:'https://www.salzburg-burgen.at/en/hohensalzburg-fortress/',label:'Buy Ticket'},
  {badge:'ther',name:'Schloss Hellbrunn — Trick Fountains',note:'Buy at the gate.',price:'€15/pp',url:'https://www.hellbrunn.at/en/',label:'Info'},
  {badge:'ther',name:'Mozart\'s Birthplace',note:'Buy at the door.',price:'€11/pp',url:'https://www.mozarteum.at/mozarts-geburtshaus/',label:'Info'},
]},
// ═══ DAY 9 ═══
{id:'day9',date:'Aug 31',dow:'Monday',city:'Munich Day Trip',dest:'munich',
headline:'Munich Day Trip',subtitle:'Salzburg → Munich by train · Back by evening',
hotel:{ci:false,name:'H+ Hotel Salzburg',location:'Night 3 of 3'},
transport:{label:'DAY TRIP — TRAIN BOTH WAYS',name:'Salzburg Hauptbahnhof → München Hauptbahnhof — ~1h45',
detail:'EC/ICE trains run every hour. Depart Salzburg ~7:30–8:00am to arrive Munich by 9:30am. Return by 5–7pm to be back in Salzburg by evening. Buy a Bayern Ticket (€29 for 2 people, all regional trains) — covers both the outbound and return trip on the slower Regional-Express, saving significantly. Or pay €20–30/pp each way for the faster EC.',
links:[{label:'Book OBB',url:'https://shop.oebbtickets.at/en/ticket'},{label:'Bayern Ticket',url:'https://www.bahn.de/angebot/regio/laender_tickets/bayernticket'}]},
schedule:[
  {time:'7:30 AM',what:'Train — Salzburg to Munich',
   why:'1h45 through the Bavarian Alps foothills. The landscape is beautiful. Arrive München Hauptbahnhof — the largest train station in Germany, also a beautiful 1970s building worth a moment of appreciation.',
   tip:'<b>Walk out the south exit of Hauptbahnhof</b> toward Schillerstrasse. 10-minute walk to Marienplatz through the city center.'},
  {time:'9:30 AM',what:'Weisses Bräuhaus — Munich Breakfast',
   why:'Tal 7, 5 minutes from Marienplatz. Open since 1490. The home of Weisswurst (white veal sausage) — a Munich tradition so specific it has a rule: Weisswurst must be eaten before noon. Order two sausages, a pretzel, sweet mustard, and a Weissbier. This is the Munich breakfast that locals have.',
   tip:'<b>The Weisswurst ritual:</b> You peel the skin with your fingers and "zuzeln" (suck the sausage from the skin). No cutlery. It sounds odd. It is correct. The sausage skin is not edible.'},
  {time:'10:30 AM',what:'Marienplatz + Glockenspiel',
   why:'Munich\'s central square. The Neues Rathaus (New Town Hall, 1908) Glockenspiel performs at 11am and noon — 43 bells, 32 life-size figures re-enacting the 1568 Schäfflertanz dance. 5 minutes. Touristy and genuinely worth watching once.',
   tip:'<b>Inside the Rathaus:</b> Take the lift to the tower viewing platform (€4, 85m) at 10:45am before the Glockenspiel crowd assembles below.'},
  {time:'11:15 AM',what:'Viktualienmarkt — Munich\'s Daily Market',
   why:'Directly behind Marienplatz. Open daily. One of the great European food markets — fresh produce, cheese, meat, Bavarian specialties, flower stalls, a beer garden at the center. Buy a snack (Obazda — Bavarian cheese spread — with bread and a beer at the market biergarten).',
   tip:'<b>The Schmalznudel</b> (fried pastry) at Café Frischhut (Prälat-Zistl-Str 8, just off the market) — Munich\'s most beloved breakfast snack since 1959. Simple, cheap, extraordinary.'},
  {time:'12:30 PM',what:'English Garden — Biergarten + River Surfers',
   why:'Englischer Garten: 3.7km², larger than Central Park, in the center of Munich. Three beer gardens inside. The river channel at the Eisbach entrance has a standing wave where local surfers ride year-round — no wetsuits in August. This is one of Munich\'s most specific pleasures.',
   tip:'<b>Chinesischer Turm biergarten</b> (inside the English Garden) — 7,000 seats, a pagoda tower, traditional Bavarian food stalls. Bring cash. Sit with a Masskrug (1-liter stein) under the chestnut trees. This is what Munich is for.',
   options:[
     {rec:true,name:'Chinesischer Turm Biergarten + Eisbach Surfers',note:'Enter the English Garden at the Prinzregentenstrasse entrance. Biergarten: pay as you go. Surfers: free to watch at the Eisbach wave.',price:'€10–18 for beer and food',url:null,label:null},
   ]},
  {time:'3:00 PM',what:'Return — Start heading toward station',
   why:'Train back to Salzburg ~4:30–5:30pm. Stop at Viktualienmarkt for a final snack or the station market for the train ride.'},
  {time:'Evening',what:'Back in Salzburg — Light Dinner',
   why:'You have been on your feet since 7am. Easy evening: hotel dinner or a simple meal at a Salzburg Gasthaus. Tomorrow: car rental and the drive to St. Gilgen.',
   tip:'<b>Café Tomaselli</b> (Alter Markt 9, Altstadt) — the oldest coffee house in Austria, open since 1705. Perfect for an evening Melange and a slice of cake before an early night.'},
],
actions:[
  {badge:'now',name:'Train Tickets — Salzburg ↔ Munich (Aug 31)',note:'Book now. Or buy Bayern Ticket on the day for the Regional-Express option.',price:'€29 Bayern Ticket (2pp) or €20–30/pp',url:'https://shop.oebbtickets.at/en/ticket',label:'Book OBB'},
]},

hotel:{
  ci:true,stay:'2 nights · Sep 1–3',
  name:'Villa Alma Wolfgangsee',stars:'★★★★★',
  detail:'Boutique lake villa directly on the Wolfgangsee shore. Exceptional — private beach access, lakefront rooms, extraordinary mountain views. One of the most beautiful small properties in the Salzkammergut. Only available in summer; book early. This is where you shift from city energy to deep rest.',
  price:'€220–380/night',
  url:'https://www.booking.com/hotel/at/villa-alma-wolfgangsee.html?checkin=2026-09-01&checkout=2026-09-03&group_adults=2&no_rooms=1',
  alts:[
    {name:'Hotel Kendler St. Gilgen',stars:'★★★★',detail:'Right on the lakefront in the village of St. Gilgen. Classic Austrian lakeside hotel, excellent breakfast, private beach. More traditional than Villa Alma but very good.',price:'€130–210/night',url:'https://www.booking.com/hotel/at/hotel-kendler.html?checkin=2026-09-01&checkout=2026-09-03&group_adults=2&no_rooms=1'},
    {name:'Hotel Post St. Gilgen',stars:'★★★',detail:'Historic village center hotel. Walking distance to the cable car and boat dock. Good value, classic Salzkammergut atmosphere.',price:'€90–150/night',url:'https://www.booking.com/hotel/at/post-st-gilgen.html?checkin=2026-09-01&checkout=2026-09-03&group_adults=2&no_rooms=1'},
  ]
},
transport:{label:'RENTAL CAR — PICK UP SALZBURG',name:'Salzburg Hauptbahnhof → St. Gilgen — ~45 min',
detail:'Pick up rental car at Salzburg Hauptbahnhof (Sixt, Hertz, or Europcar all have desks at or near the station). Drive B158 Wolfgangseestrasse — a beautiful mountain road along the valley floor. The lake appears suddenly around a bend: crystal-clear alpine water in a bowl of limestone peaks. Return car Sep 3 morning at Salzburg Hauptbahnhof before your train to Ljubljana.',
links:[{label:'Sixt — Salzburg Station',url:'https://www.sixt.at/mietwagen/salzburg-bahnhof/'},{label:'Hertz — Salzburg',url:'https://www.hertz.at'}]},
schedule:[
  {time:'Morning',what:'Check Out H+ Hotel · Pick Up Rental Car',
   why:'Check out by 11am. Car rental desks at Salzburg Hauptbahnhof open from 8am. Book in advance — September is the end of summer season.',
   tip:'<b>Book a manual car</b> if you drive manual — it\'s significantly cheaper. The mountain roads around Wolfgangsee and to Hallstatt are narrow but manageable at normal speeds.'},
  {time:'Midday',what:'Drive Salzburg → St. Gilgen (B158)',
   why:'45-minute drive. The Wolfgangsee appears around a bend in the road — nothing prepares you for the scale and clarity of the water. Pull over at the first layby and just stand there for a moment.',
   tip:'<b>The village of St. Gilgen</b> is where Mozart\'s mother Anna Maria was born in 1720. Small square, fountain, lakeside promenade. Parking is easy outside the village center.'},
  {time:'Afternoon',what:'Zwölferhorn Cable Car',
   why:'From the village center, a gondola lifts to 1,522 meters. The Alpine panorama: the entire Wolfgangsee below, the Dachstein glacier to the south, the Salzburg basin to the north. On a clear September afternoon, this view reaches into 4 countries.',
   tip:'<b>September timing:</b> Go in the afternoon when the haze has burned off. Last gondola is usually 5pm — check times on the day.',
   options:[
     {rec:true,name:'Zwölferhorn Cable Car (Return)',note:'Buy at the base station in St. Gilgen.',price:'€29/pp',url:'https://www.zwoelferhorn.at',label:'Official Site'},
   ]},
  {time:'Evening',what:'First Evening on the Lake',
   why:'Wolfgangsee in September: the summer crowds thin but the weather holds. Walk the lakefront promenade at dusk. The water is 22–24°C in early September — warm enough to swim if you want.',
   tip:'<b>Wolfgangsee boat:</b> The paddle steamer that circles the lake (Kaiser Franz Josef I, operating since 1873) has late afternoon departures. An hour on the water at sunset.',
   options:[
     {rec:true,name:'Wolfgangsee Paddle Steamer — Evening Cruise',note:'Check timetable at the dock. Last departures ~4:30–5:30pm.',price:'€18–25/pp',url:'https://www.wolfgangsee-schifffahrt.at',label:'Timetable'},
     {rec:false,name:'Restaurant Furian — Lake Dinner',note:'Directly on the lake, 5 min from St. Gilgen. Fresh fish from the Wolfgangsee, Austrian classics. Very good and genuinely local.',price:'€25–40/pp',url:'https://restaurant-furian.at',label:'Site'},
   ]},
],

{id:'day11',date:'Sep 2',dow:'Wednesday',city:'Wolfgangsee + Hallstatt',dest:'hallstatt',
headline:'Hallstatt Day Trip',subtitle:'Drive to Hallstatt at dawn · Salt mine · Afternoon back on the lake',
hotel:{ci:false,name:'Villa Alma Wolfgangsee',location:'Night 2 of 2'},
transport:{label:'BY RENTAL CAR',name:'St. Gilgen → Bad Ischl → Hallstatt — ~45 min',
detail:'Drive south on B158 to Bad Ischl, then B145 to Hallstatt. 45 minutes. Arrive before 9am — this is critical. The UNESCO World Heritage village has a strict daily visitor limit. By 10am, tour buses from Salzburg, Vienna, and (especially) from China and Korea fill every walking surface. The Hallstatt you experience at 7:30am is a different place entirely.',
links:[]},
schedule:[
  {time:'7:00 AM',what:'Drive to Hallstatt — Arrive Before 9am',
   why:'Hallstatt is one of the most beautiful places in Europe. It is also one of the most visited — 10,000 day-trippers in August. At 7am the mist is on the lake, the bells of the church echo off the water, fishing boats are still tied at the dock, and you are nearly alone. This window closes by 10am.',
   tip:'<b>Parking:</b> Drive to the Lahn parking area at the southern end of the village. Walk 5 minutes into the historic center along the lakefront path. Do not try to park closer — the narrow lanes are restricted.',
   options:[
     {rec:true,name:'Drive from St. Gilgen — Depart 7:00am',note:'~45 min drive. Arrive before 9am.',price:'Fuel: ~€5',url:null,label:null},
   ]},
  {time:'8:00 AM',what:'Hallstatt Morning — Village Walk at Dawn',
   why:'Walk Seestrasse, the main lakefront path. The market square (Marktplatz) with its Trinity Column and painted houses. The parish church on the cliff with its hanging flower boxes. The boat dock. The reflections of the houses in the Hallstätter See at dawn. This is what all the photographs are of — and in person, it is even more.',
   tip:'<b>The famous view</b> of the church reflected in the lake is photographed from the boat dock at the northern end of the village. At 8am you have it to yourself for 20 minutes.'},
  {time:'9:00 AM',what:'Hallstatt Salt Mine — Salzwelten',
   why:'The oldest known salt mine in the world. Hallstatt has been mined for salt since 3,500 years ago (Bronze Age). The tour takes you underground — a 64-meter wooden slide connects levels, and the deepest shaft was cut in 1719. The preserved Bronze Age tools, the ancient timbers, and the underground salt lake are genuinely extraordinary.',
   tip:'<b>Book online ahead.</b> The salt mine is capacity-controlled and can sell out by 9am on peak August days. The funicular up to the mine entrance takes 4 minutes and is part of the ticket.',
   options:[
     {rec:true,name:'Salzwelten Hallstatt — Salt Mine Tour',note:'Book online in advance. Funicular included. ~1.5 hours underground.',price:'€38/pp',url:'https://www.salzwelten.at/en/hallstatt/',label:'Book Tour'},
   ]},
  {time:'11:00 AM',what:'Skywalk Viewpoint',
   why:'At the top of the funicular (also reached via the salt mine funicular), the Hallstatt Skywalk is a viewing platform extending over the cliff. The full panorama of the lake, the village below, the Dachstein mountains behind. The postcard shot from above — worth 30 minutes.',
   tip:'<b>Included with the funicular ticket</b> if you\'re already up from the salt mine. No extra cost.'},
  {time:'12:30 PM',what:'Lunch at Gasthof Simony',
   why:'Am Markt 105, directly on the market square facing the lake. Open since the 19th century. Fresh Reinanke fish from the Hallstätter See, Schnitzel, Austrian classics. Terrace with lake view. The lunch after the salt mine.',
   tip:'<b>Order the Saibling</b> (Arctic char) if it\'s on the menu — caught in this lake, prepared simply with butter and herbs. This is what this place exists to serve.',
   options:[
     {rec:true,name:'Gasthof Simony — Lakefront Lunch',note:'Am Markt 105. Book ahead for terrace.',price:'€25–40/pp',url:'https://simony.at',label:'Site'},
   ]},
  {time:'2:00 PM',what:'Beinhaus (Ossuary) — Painted Skulls',
   why:'Inside the churchyard, a small chapel houses 1,200 painted human skulls. When the cemetery ran out of space, the village began exhuming bones after 10–12 years and decorating the skulls with the names and flowers of the deceased. The practice continued from 1720 until 1995. It is macabre and deeply moving — a material record of 275 years of a community.',
   tip:'<b>Entry is €1.50.</b> You will see nothing like it anywhere else on this trip. Do not skip it because of the subject matter.'},
  {time:'3:00 PM',what:'Drive Back Toward St. Gilgen — Stop at Bad Ischl',
   why:'Bad Ischl is the Salzkammergut\'s historic spa town — Emperor Franz Joseph spent every summer here from 1849 until 1914. The Kaiservilla (imperial summer villa) is a beautiful yellow biedermeier building set in parkland. Quick stop: walk through the town center and have a coffee at Café Zauner (the most famous pastry shop in the region, open since 1832).',
   tip:'<b>Café Zauner</b> (Pfarrgasse 7) makes the Zaunerstollen — a marzipan and chocolate confection invented here in 1832. Worth the stop entirely for this.',
   options:[
     {rec:true,name:'Café Zauner Bad Ischl + Kaiservilla Walk',note:'30-minute stop. Coffee and Stollen at Zauner, walk past the Kaiservilla.',price:'€8–15',url:'https://www.zauner.at',label:'Site'},
   ]},
  {time:'5:00 PM',what:'Back at Wolfgangsee — Swim or Boat',
   why:'September lake water at 22–24°C. A swim from your hotel\'s private dock. Or the evening paddle steamer. The light on the lake at 5pm in September is different from any other hour.',
   tip:'<b>Dinner tonight:</b> Gasthof Bilgeri in Ried im Steinfeld (5 min drive from St. Gilgen) — a local farmhouse restaurant where the St. Gilgen families actually eat. Not in any guidebook. Simple, honest food, extraordinary value.',

// ─── RENDERERS ───────────────────────────────────────────────────────────────

function badgeEl(type){
  const m={now:['b-now','BOOK TODAY'],ahed:['b-ahed','BOOK AHEAD'],ther:['b-ther','PAY THERE'],free:['b-free','FREE'],vrfy:['b-vrfy','VERIFY FIRST']};
  const[cls,lbl]=m[type]||m.ther;
  return`<span class="badge ${cls}">${lbl}</span>`;
}

function lbtn(url,label,gold=false,sm=false){
  if(!url||!label)return'';
  const c=['lbtn',gold?'g':'',sm?'sm':''].filter(Boolean).join(' ');
  return`<a href="${url}" target="_blank" class="${c}">${label} ↗</a>`;
}

function renderHotel(d){
  if(!d.hotel)return'';
  const h=d.hotel,col=C[d.dest]||'#4a5068';
  if(!h.ci){
    return`<div class="same-hotel">
      <div class="sh-dot" style="background:${col}"></div>
      <div><div class="sh-name">${h.name}</div><div class="sh-meta">${h.location||''}</div></div>
    </div>`;
  }
  let s=`<div class="hotel-card" style="--dest:${col};--dest-bg:rgba(${hexRgb(col)},0.08);--dest-b:rgba(${hexRgb(col)},0.22);">`;
  s+=`<div class="hotel-card-lbl">WHERE YOU SLEEP — ${h.stay||''}</div>`;
  s+=`<div class="hotel-rec">
    <div class="hotel-rec-badge">★ Our Pick</div>
    <div class="hotel-rec-name">${h.name}</div>
    <div class="hotel-rec-stars">${h.stars||''}</div>
    <div class="hotel-rec-detail">${h.detail||''}</div>
    <div class="hotel-rec-foot">
      <span class="hotel-rec-price">${h.price||''}</span>
      ${lbtn(h.url,'Book on Booking.com',true)}
    </div>
  </div>`;
  if(h.alts&&h.alts.length){
    s+=`<div class="hotel-alts-hd">Also Consider — ${h.alts.length} Alternatives</div>`;
    h.alts.forEach((a,i)=>{
      s+=`<div class="hotel-alt">
        <div class="ha-num">${i+1}</div>
        <div class="ha-info">
          <div class="ha-name"><span class="ha-stars">${a.stars}</span>${a.name}</div>
          <div class="ha-detail">${a.detail||''}</div>
        </div>
        <div class="ha-right"><span class="ha-price">${a.price||''}</span>${lbtn(a.url,'Book',false,true)}</div>
      </div>`;
    });
  }
  s+=`</div>`;
  return s;
}

function renderTransport(d){
  if(!d.transport)return'';
  const t=d.transport;
  const tlinks=(t.links||[]).map(l=>lbtn(l.url,l.label)).join('');
  return`<div class="transport-card">
    <div class="tc-lbl">${t.label}</div>
    <div class="tc-name">${t.name}</div>
    <div class="tc-detail">${t.detail}</div>
    ${tlinks?`<div class="tc-links">${tlinks}</div>`:''}
  </div>`;
}

function renderOptions(opts){
  if(!opts||!opts.length)return'';
  let s=`<div class="opt-hd">Your Options</div><div class="opt-list">`;
  opts.forEach(o=>{
    s+=`<div class="opt-item${o.rec?' rec':''}">
      <div class="oi-star">${o.rec?'★':''}</div>
      <div class="oi-body">
        <div class="oi-name">${o.name}</div>
        ${o.note?`<div class="oi-note">${o.note}</div>`:''}
      </div>
      <div class="oi-right">
        ${o.price?`<span class="oi-price">${o.price}</span>`:''}
        ${(o.url&&o.label)?lbtn(o.url,o.label,false,true):''}
      </div>
    </div>`;
  });
  s+=`</div>`;
  return s;
}

function buildSidebar(){
  const sb=document.getElementById('sb');
  GROUPS.forEach(g=>{
    const col=C[g.color]||'#4a5068';
    const lbl=document.createElement('div');
    lbl.className='sb-group';
    lbl.innerHTML=`<span class="sb-group-dot" style="background:${col}"></span>${g.label}`;
    sb.appendChild(lbl);
    g.ids.forEach(id=>{
      const d=DAYS.find(x=>x.id===id);
      if(!d)return;
      const el=document.createElement('div');
      el.className='sb-day';el.id='nav-'+id;el.onclick=()=>go(id);
      const dcol=C[d.dest]||'#4a5068';
      const short=d.city.split(' →')[0].split(' —')[0];
      el.innerHTML=`<div class="sb-dot" style="background:${dcol}"></div>
        <div>
          <div class="sb-date">${d.date}</div>
          <div class="sb-city">${d.isBirthday?'★ Birthday':short}</div>
        </div>`;
      sb.appendChild(el);
    });
  });
}

function buildContent(){
  const ct=document.getElementById('ct');
  DAYS.forEach(d=>{
    const col=C[d.dest]||'#4a5068';
    const rgb=hexRgb(col);
    const panel=document.createElement('div');
    panel.className='day-panel'+(d.isBirthday?' bday-panel':'');
    panel.id='panel-'+d.id;
    panel.style.setProperty('--dest',col);
    panel.style.setProperty('--dest-rgb',rgb);
    panel.style.setProperty('--dest-bg',`rgba(${rgb},0.07)`);
    panel.style.setProperty('--dest-b',`rgba(${rgb},0.20)`);

    let h=`<div class="dest-hero"></div><div class="panel-body">`;

    // Birthday banner
    if(d.isBirthday){
      h+=`<div class="bday-banner">
        <div class="bday-icon">★</div>
        <div>
          <div class="bday-ttl">Happy Birthday, Hovhannes</div>
          <div class="bday-sub">Tonight: Strelec Restaurant inside Ljubljana Castle. Michelin Plate. Window table over the city. The Julian Alps at dusk. Reserve the moment the hotel is confirmed — only 40 seats.</div>
        </div>
      </div>`;
    }

    // Header
    h+=`<div class="day-header">
      <div class="dh-eyebrow">
        <div class="dh-dot" style="background:${col}"></div>
        ${d.dow} &nbsp;·&nbsp; <span class="dh-dest">${d.city}</span>
        ${d.isBirthday?'&nbsp;·&nbsp; <span style="color:var(--gold)">★ Birthday</span>':''}
      </div>
      <h1>${d.headline}</h1>
      <div class="dh-sub">${d.date} &nbsp;·&nbsp; ${d.subtitle}</div>
    </div>`;

    // Hotel + transport
    h+=renderHotel(d);
    h+=renderTransport(d);

    // Schedule
    if(d.schedule&&d.schedule.length){
      h+=`<div class="sec-hd">Today's Schedule</div><div class="sched">`;
      d.schedule.forEach(s=>{
        h+=`<div class="tb">
          <div class="tb-time">${s.time}</div>
          <div class="tb-body">
            <div class="tb-what">${s.what}</div>
            <div class="tb-why">${s.why}</div>
            ${s.tip?`<div class="tb-tip"><b>Tip:</b> ${s.tip}</div>`:''}
            ${s.price?`<div style="font-size:12px;font-weight:600;color:var(--t2);margin-top:6px">${s.price}</div>`:''}
            ${renderOptions(s.options)}
          </div>
        </div>`;
      });
      h+=`</div>`;
    }

    // Actions
    if(d.actions&&d.actions.length){
      h+=`<div class="sec-hd" style="margin-top:28px">What to Book &amp; Buy</div><div class="actions">`;
      d.actions.forEach(a=>{
        h+=`<div class="ac">
          ${badgeEl(a.badge)}
          <div class="ac-info">
            <div class="ac-name">${a.name}</div>
            ${a.note?`<div class="ac-note">${a.note}</div>`:''}
          </div>
          <div class="ac-right">
            ${a.price?`<span class="ac-price">${a.price}</span>`:''}
            ${lbtn(a.url,a.label,a.gold||false,true)}
          </div>
        </div>`;
      });
      h+=`</div>`;
    }

    h+=`</div>`; // close panel-body
    panel.innerHTML=h;
    ct.appendChild(panel);
  });
}

function go(id){
  document.querySelectorAll('.day-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sb-day').forEach(n=>n.classList.remove('active'));
  const panel=document.getElementById('panel-'+id);
  const nav=document.getElementById('nav-'+id);
  const d=DAYS.find(x=>x.id===id);
  if(d){
    const col=C[d.dest]||'#4a5068';
    document.documentElement.style.setProperty('--dest-active',col);
  }
  if(panel){panel.classList.add('active');document.getElementById('ct').scrollTop=0;}
  if(nav){nav.classList.add('active');nav.scrollIntoView({block:'nearest',inline:'nearest',behavior:'smooth'});}
}

buildSidebar();
buildContent();
go('day1');
</script>
</body>
</html>
