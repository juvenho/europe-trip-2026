<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Europe 2026 — Day Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#09090f; --s1:#111118; --s2:#16161e; --s3:#1d1d27;
  --border:rgba(255,255,255,0.07); --border-hi:rgba(255,255,255,0.13);
  --t1:#f0f2f6; --t2:#b8bfcc; --t3:#6c7380; --t4:#3d4050;
  --gold:#c8a347; --gold-bg:rgba(200,163,71,0.10); --gold-b:rgba(200,163,71,0.22);
  --cyan:#00c8f0; --cyan-bg:rgba(0,200,240,0.10); --cyan-b:rgba(0,200,240,0.2);
  --r:10px; --r-sm:6px;
  --now:#e05252;   --now-bg:rgba(224,82,82,0.12);
  --ahead:#d4932a; --ahead-bg:rgba(212,147,42,0.12);
  --there:#2fb87a; --there-bg:rgba(47,184,122,0.10);
  --free-c:#4a5068; --free-bg:rgba(74,80,104,0.25);
  --verify:#d4732a; --verify-bg:rgba(212,115,42,0.14);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);font-size:14px;line-height:1.55;overflow:hidden;}
a{color:var(--cyan);text-decoration:none;}
a:hover{text-decoration:underline;}

/* ── SHELL ── */
.app{display:flex;flex-direction:column;height:100vh;}

/* ── TOPBAR ── */
.topbar{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;border-bottom:1px solid var(--border);background:var(--s1);
  gap:12px;flex-wrap:wrap;
}
.topbar-title{font-size:15px;font-weight:700;color:var(--t1);}
.topbar-meta{font-size:12px;color:var(--t3);margin-top:1px;}
.topbar-pills{display:flex;gap:6px;flex-wrap:wrap;}
.pill{
  font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;
  border:1px solid var(--border-hi);color:var(--t3);background:none;
  font-family:inherit;cursor:pointer;text-decoration:none;transition:all .12s;white-space:nowrap;
}
.pill:hover{color:var(--cyan);border-color:var(--cyan);text-decoration:none;}
.pill.hot{color:var(--now);border-color:rgba(224,82,82,.4);background:var(--now-bg);}

/* ── MAIN ── */
.main{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{
  width:180px;flex-shrink:0;border-right:1px solid var(--border);
  overflow-y:auto;background:var(--s1);padding:8px 0 20px;
  scrollbar-width:thin;scrollbar-color:var(--border-hi) transparent;
}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:3px;}
.sb-group{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t4);padding:14px 16px 5px;}
.sb-group:first-child{padding-top:8px;}
.sb-day{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;border-left:2px solid transparent;transition:all .12s;}
.sb-day:hover{background:var(--s2);}
.sb-day.active{background:var(--s2);border-left-color:var(--cyan);}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sb-date{font-size:12px;font-weight:600;color:var(--t2);line-height:1.2;}
.sb-city{font-size:11px;color:var(--t3);line-height:1.2;margin-top:1px;}
.sb-day.active .sb-date{color:var(--cyan);}
.sb-day.active .sb-city{color:rgba(0,200,240,.65);}

/* ── CONTENT ── */
.content{
  flex:1;overflow-y:auto;padding:28px 32px 60px;
  scrollbar-width:thin;scrollbar-color:var(--border-hi) transparent;
}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:4px;}
.day-panel{display:none;max-width:860px;}
.day-panel.active{display:block;}

/* ── DAY HEADER ── */
.day-header{margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.dh-eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.dh-dot{width:8px;height:8px;border-radius:50%;}
.day-header h1{font-size:26px;font-weight:700;letter-spacing:-.4px;color:var(--t1);margin-bottom:4px;}
.day-header .dh-sub{font-size:13px;color:var(--t3);}
.bday-hd h1{color:var(--gold);}
.bday-hd .dh-eyebrow{color:rgba(200,163,71,.8);}

/* ── BIRTHDAY BANNER ── */
.bday-banner{
  background:linear-gradient(135deg,rgba(200,163,71,.13),rgba(200,163,71,.03));
  border:1px solid var(--gold-b);border-radius:var(--r);
  padding:16px 18px;margin-bottom:18px;
  display:flex;align-items:flex-start;gap:14px;
}
.bday-icon{font-size:28px;flex-shrink:0;line-height:1;}
.bday-ttl{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:3px;}
.bday-sub{font-size:13px;color:var(--t2);line-height:1.5;}

/* ── SECTION HEADING ── */
.sec-hd{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--t4);margin:22px 0 10px;}

/* ────────────────────────────────
   HOTEL CARD
──────────────────────────────── */
.hotel-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}
.hotel-card-lbl{font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--t4);padding:11px 16px 0;}
.hotel-rec{padding:14px 16px 16px;border-bottom:1px solid var(--border);}
.hotel-rec-badge{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-b);border-radius:4px;padding:3px 9px;margin-bottom:9px;}
.hotel-rec-name{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:3px;line-height:1.3;}
.hotel-rec-stars{font-size:12px;color:var(--gold);margin-bottom:8px;}
.hotel-rec-detail{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:13px;}
.hotel-rec-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.hotel-rec-price{font-size:14px;font-weight:700;color:var(--gold);}
.hotel-alts-hd{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t4);padding:9px 16px;background:rgba(255,255,255,.018);border-bottom:1px solid var(--border);}
.hotel-alt{display:flex;align-items:center;gap:12px;padding:12px 16px;border-top:1px solid var(--border);transition:background .1s;}
.hotel-alt:hover{background:rgba(255,255,255,.02);}
.ha-num{width:22px;height:22px;border-radius:50%;background:var(--s3);border:1px solid var(--border-hi);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t4);}
.ha-info{flex:1;min-width:0;}
.ha-name{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:2px;}
.ha-stars{font-size:11px;color:var(--gold);margin-right:5px;}
.ha-detail{font-size:12px;color:var(--t3);line-height:1.45;}
.ha-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.ha-price{font-size:12px;font-weight:600;color:var(--t3);white-space:nowrap;}

/* Same-hotel strip */
.same-hotel{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 14px;margin-bottom:16px;}
.sh-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sh-body{flex:1;}
.sh-name{font-size:13px;font-weight:600;color:var(--t2);}
.sh-meta{font-size:11px;color:var(--t4);}

/* ── TRANSPORT CARD ── */
.transport-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:15px 16px;margin-bottom:16px;}
.tc-lbl{font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--t4);margin-bottom:7px;}
.tc-name{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:5px;}
.tc-detail{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:10px;}
.tc-links{display:flex;gap:8px;flex-wrap:wrap;}

/* ── LINK BUTTONS ── */
.lbtn{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--cyan-bg);border:1px solid var(--cyan-b);
  color:var(--cyan);border-radius:var(--r-sm);
  font-size:12px;font-weight:600;padding:6px 13px;
  text-decoration:none;font-family:inherit;cursor:pointer;
  transition:all .12s;white-space:nowrap;
}
.lbtn:hover{background:rgba(0,200,240,.18);text-decoration:none;}
.lbtn.g{background:var(--gold-bg);border-color:var(--gold-b);color:var(--gold);}
.lbtn.g:hover{background:rgba(200,163,71,.18);}
.lbtn.sm{font-size:11px;padding:5px 11px;}
.lbtn.dim{background:rgba(255,255,255,.04);border-color:var(--border-hi);color:var(--t3);}
.lbtn.dim:hover{color:var(--t2);background:rgba(255,255,255,.07);}

/* ── SCHEDULE ── */
.sched{display:flex;flex-direction:column;gap:10px;}
.tb{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;gap:14px;transition:border-color .12s;}
.tb:hover{border-color:var(--border-hi);}
.tb-time{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);min-width:76px;padding-top:1px;flex-shrink:0;}
.tb-body{flex:1;min-width:0;}
.tb-what{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:3px;}
.tb-why{font-size:13px;color:var(--t3);line-height:1.55;}
.tb-tip{font-size:12px;color:var(--t4);line-height:1.45;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-style:italic;}

/* ────────────────────────────────
   ACTIVITY OPTIONS (per time block)
──────────────────────────────── */
.opt-hd{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t4);margin:10px 0 6px;}
.opt-list{display:flex;flex-direction:column;gap:5px;}
.opt-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;background:var(--s3);
  border:1px solid var(--border);border-radius:var(--r-sm);
  transition:border-color .1s;
}
.opt-item:hover{border-color:var(--border-hi);}
.opt-item.rec{background:var(--gold-bg);border-color:var(--gold-b);}
.oi-star{font-size:11px;color:var(--gold);width:14px;flex-shrink:0;text-align:center;}
.oi-body{flex:1;min-width:0;}
.oi-name{font-size:13px;font-weight:600;color:var(--t1);line-height:1.3;}
.oi-note{font-size:11px;color:var(--t3);margin-top:1px;line-height:1.35;}
.oi-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.oi-price{font-size:12px;font-weight:700;color:var(--t2);white-space:nowrap;}

/* ── BOOKING ACTIONS ── */
.actions{display:flex;flex-direction:column;gap:8px;}
.ac{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;display:flex;align-items:center;gap:12px;transition:border-color .12s;}
.ac:hover{border-color:var(--border-hi);}
.badge{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;padding:4px 9px;border-radius:4px;white-space:nowrap;flex-shrink:0;min-width:90px;text-align:center;}
.b-now{background:var(--now-bg);color:var(--now);border:1px solid rgba(224,82,82,.25);}
.b-ahed{background:var(--ahead-bg);color:var(--ahead);border:1px solid rgba(212,147,42,.25);}
.b-ther{background:var(--there-bg);color:var(--there);border:1px solid rgba(47,184,122,.2);}
.b-free{background:var(--free-bg);color:var(--free-c);border:1px solid rgba(255,255,255,.08);}
.b-vrfy{background:var(--verify-bg);color:var(--verify);border:1px solid rgba(212,115,42,.3);}
.ac-info{flex:1;min-width:0;}
.ac-name{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:2px;}
.ac-note{font-size:12px;color:var(--t3);line-height:1.4;}
.ac-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.ac-price{font-size:13px;font-weight:700;color:var(--t2);white-space:nowrap;}

/* ── RESPONSIVE ── */
@media(max-width:780px){
  body{overflow:auto;}
  .app{height:auto;}
  .main{flex-direction:column;overflow:visible;}
  .content{overflow:visible;padding:14px 14px 40px;}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);overflow-x:auto;overflow-y:hidden;display:flex;flex-direction:row;padding:6px 8px;gap:3px;scrollbar-width:none;}
  .sidebar::-webkit-scrollbar{display:none;}
  .sb-group{display:none;}
  .sb-day{flex-direction:column;align-items:center;gap:2px;padding:7px 10px;border-left:none;border-bottom:2px solid transparent;border-radius:var(--r-sm);white-space:nowrap;flex-shrink:0;}
  .sb-day.active{background:var(--s3);border-bottom-color:var(--cyan);}
  .sb-dot{display:none;}
  .topbar{padding:10px 14px;}
  .topbar-pills{display:none;}
  .day-header h1{font-size:21px;}
  .hotel-alt{flex-wrap:wrap;}
  .ha-right{padding-top:4px;}
  .ac{flex-wrap:wrap;}
  .ac-right{width:100%;justify-content:flex-start;padding-top:4px;}
  .opt-item{flex-wrap:wrap;}
  .oi-right{padding-top:4px;}
  .tb{flex-direction:column;gap:6px;}
  .tb-time{min-width:auto;}
}
@media(max-width:480px){.content{padding:10px 10px 32px;}}
</style>
</head>

// ─── RENDERERS ──────────────────────────────────────────────────────────────

function badgeEl(type){
  const m={now:['b-now','BOOK TODAY'],ahed:['b-ahed','BOOK AHEAD'],ther:['b-ther','PAY THERE'],free:['b-free','FREE'],vrfy:['b-vrfy','VERIFY FIRST']};
  const[cls,lbl]=m[type]||m.ther;
  return`<span class="badge ${cls}">${lbl}</span>`;
}
function lbtn(url,label,gold=false,sm=false,dim=false){
  if(!url||!label)return'';
  const c=['lbtn',gold?'g':'',sm?'sm':'',dim?'dim':''].filter(Boolean).join(' ');
  return`<a href="${url}" target="_blank" class="${c}">${label}</a>`;
}

function renderHotel(d){
  if(!d.hotel)return'';
  const h=d.hotel, col=C[d.dest]||'#4a5068';
  if(!h.ci){
    return`<div class="same-hotel">
      <div class="sh-dot" style="background:${col}"></div>
      <div class="sh-body"><div class="sh-name">${h.name}</div><div class="sh-meta">${h.location||''}</div></div>
    </div>`;
  }
  let s=`<div class="hotel-card">`;
  s+=`<div class="hotel-card-lbl">🏨 Where You Sleep — ${h.stay||''}</div>`;
  s+=`<div class="hotel-rec">
    <div class="hotel-rec-badge">★ Our Recommendation</div>
    <div class="hotel-rec-name">${h.name}</div>
    <div class="hotel-rec-stars">${h.stars||''}</div>
    <div class="hotel-rec-detail">${h.detail||''}</div>
    <div class="hotel-rec-foot">
      <span class="hotel-rec-price">${h.price||''}</span>
      ${lbtn(h.url,'Book on Booking.com',true)}
    </div>
  </div>`;
  if(h.alts&&h.alts.length){
    s+=`<div class="hotel-alts-hd">Also Consider — ${h.alts.length} Alternatives</div>`;
    h.alts.forEach((a,i)=>{
      s+=`<div class="hotel-alt">
        <div class="ha-num">${i+1}</div>
        <div class="ha-info"><div class="ha-name"><span class="ha-stars">${a.stars}</span>${a.name}</div><div class="ha-detail">${a.detail||''}</div></div>
        <div class="ha-right"><span class="ha-price">${a.price||''}</span>${lbtn(a.url,'Book',false,true)}</div>
      </div>`;
    });
  }
  s+=`</div>`;
  return s;
}

function renderTransport(d){
  if(!d.transport)return'';
  const t=d.transport;
  const tlinks=(t.links||[]).map(l=>lbtn(l.url,l.label)).join('');
  return`<div class="transport-card">
    <div class="tc-lbl">✈ ${t.label}</div>
    <div class="tc-name">${t.name}</div>
    <div class="tc-detail">${t.detail}</div>
    ${tlinks?`<div class="tc-links">${tlinks}</div>`:''}
  </div>`;
}

function renderOptions(opts){
  if(!opts||!opts.length)return'';
  let s=`<div class="opt-hd">Your Options</div><div class="opt-list">`;
  opts.forEach(o=>{
    s+=`<div class="opt-item${o.rec?' rec':''}">
      <div class="oi-star">${o.rec?'★':''}</div>
      <div class="oi-body">
        <div class="oi-name">${o.name}</div>
        ${o.note?`<div class="oi-note">${o.note}</div>`:''}
      </div>
      <div class="oi-right">
        <span class="oi-price">${o.price||''}</span>
        ${(o.url&&o.label)?lbtn(o.url,o.label,false,true):''}
      </div>
    </div>`;
  });
  s+=`</div>`;
  return s;
}

function buildSidebar(){
  const sb=document.getElementById('sb');
  GROUPS.forEach(g=>{
    const lbl=document.createElement('div');
    lbl.className='sb-group';lbl.textContent=g.label;sb.appendChild(lbl);
    g.ids.forEach(id=>{
      const d=DAYS.find(x=>x.id===id);
      if(!d)return;
      const el=document.createElement('div');
      el.className='sb-day';el.id='nav-'+id;el.onclick=()=>go(id);
      const short=d.city.split(' →')[0].split(' —')[0].split(' (')[0];
      el.innerHTML=`<div class="sb-dot" style="background:${C[d.dest]||'#4a5068'}"></div>
        <div><div class="sb-date">${d.date}</div><div class="sb-city">${d.isBirthday?'🎂 Birthday':short}</div></div>`;
      sb.appendChild(el);
    });
  });
}

function buildContent(){
  const ct=document.getElementById('ct');
  DAYS.forEach(d=>{
    const panel=document.createElement('div');
    panel.className='day-panel'+(d.isBirthday?' bday-hd':'');
    panel.id='panel-'+d.id;
    const col=C[d.dest]||'#4a5068';
    let h='';

    // Header
    h+=`<div class="day-header">
      <div class="dh-eyebrow"><span class="dh-dot" style="background:${col}"></span>${d.dow} · ${d.city}${d.isBirthday?' · <span style="color:var(--gold)">★ Birthday</span>':''}</div>
      <h1>${d.headline}</h1>
      <div class="dh-sub">${d.date} &nbsp;·&nbsp; ${d.subtitle}</div>
    </div>`;

    // Birthday banner
    if(d.isBirthday){
      h+=`<div class="bday-banner"><div class="bday-icon">🎂</div><div>
        <div class="bday-ttl">Happy Birthday — Tonight is Yours</div>
        <div class="bday-sub">Strelec Restaurant inside Ljubljana Castle. Michelin Plate. City panorama at dusk over the Julian Alps. Reserve the moment the hotel is confirmed.</div>
      </div></div>`;
    }

    // Hotel + transport
    h+=renderHotel(d);
    h+=renderTransport(d);

    // Schedule
    if(d.schedule&&d.schedule.length){
      h+=`<div class="sec-hd">Today's Schedule</div><div class="sched">`;
      d.schedule.forEach(s=>{
        h+=`<div class="tb">
          <div class="tb-time">${s.time}</div>
          <div class="tb-body">
            <div class="tb-what">${s.what}</div>
            <div class="tb-why">${s.why}</div>
            ${s.tip?`<div class="tb-tip">Insider tip: ${s.tip}</div>`:''}
            ${s.price?`<div style="font-size:12px;font-weight:600;color:var(--t2);margin-top:5px;">${s.price}</div>`:''}
            ${renderOptions(s.options)}
          </div>
        </div>`;
      });
      h+=`</div>`;
    }

    // Booking actions
    if(d.actions&&d.actions.length){
      h+=`<div class="sec-hd" style="margin-top:24px;">What to Book &amp; Buy</div><div class="actions">`;
      d.actions.forEach(a=>{
        h+=`<div class="ac">
          ${badgeEl(a.badge)}
          <div class="ac-info"><div class="ac-name">${a.name}</div>${a.note?`<div class="ac-note">${a.note}</div>`:''}</div>
          <div class="ac-right">${a.price?`<span class="ac-price">${a.price}</span>`:''}${lbtn(a.url,a.label,a.gold||false,true)}</div>
        </div>`;
      });
      h+=`</div>`;
    }

    panel.innerHTML=h;
    ct.appendChild(panel);
  });
}

function go(id){
  document.querySelectorAll('.day-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sb-day').forEach(n=>n.classList.remove('active'));
  const panel=document.getElementById('panel-'+id);
  const nav=document.getElementById('nav-'+id);
  if(panel){panel.classList.add('active');document.getElementById('ct').scrollTop=0;}
